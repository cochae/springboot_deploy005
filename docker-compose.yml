version: "3.9"

services:
  # Spring Boot
  springboot_server:
    container_name: springboot_server
    build:
      context: ./deploy005_springboot_react
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    networks:
      - app-network

  # React + Nginx
  react_front:
    container_name: react_front
    build:
      context: ./deploy_front
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - springboot_server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
